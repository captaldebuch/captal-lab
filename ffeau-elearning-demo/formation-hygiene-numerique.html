<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nouveau module — Gabarit | FFEAU</title>
<meta name="description" content="Module de formation à distance et certification — Forces françaises aux Émirats arabes unis (Camp de la Paix). Cours, QCM et diplôme nominatif.">
<style>
/* =========================================================================
   FFEAU — MODULE DE FORMATION À DISTANCE (e-learning + QCM + diplôme)
   Identité visuelle : Marine nationale / Ministère des Armées
   — bleu marine, or, accent sable ; typographie Marianne (police de l'État).
   ========================================================================= */
:root{
  --bleu:#00205B;--bleu-fonce:#001233;--bleu-clair:#0a3a78;--rouge:#ED2939;--or:#C8A24B;--or-clair:#e4c878;
  --sable:#9c6b41;--fond:#eef1f5;--surface:#ffffff;--surface-2:#f5f8fc;--texte:#0f1d2e;--texte-doux:#54657a;
  --bordure:#d7dfea;--ok:#1e7e54;--ok-fond:#e7f4ee;--err:#c0152f;--err-fond:#fcebed;
  --ombre:0 14px 40px rgba(0,32,91,.10);--ombre-sm:0 2px 10px rgba(0,32,91,.07);--rayon:16px;
  --transition:.25s cubic-bezier(.4,0,.2,1);--police:'Marianne','Inter','Segoe UI',Roboto,-apple-system,BlinkMacSystemFont,Helvetica,Arial,sans-serif;
}
@media (prefers-color-scheme:dark){
  :root{--fond:#0a1320;--surface:#11202f;--surface-2:#0d1a28;--texte:#eef3f8;--texte-doux:#9fb1c4;
    --bordure:#22384e;--ombre:0 14px 40px rgba(0,0,0,.45);--ombre-sm:0 2px 10px rgba(0,0,0,.35);
    --ok-fond:#10261c;--err-fond:#2a1216;--or:#e4c878;}
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:var(--police);background:var(--fond);color:var(--texte);line-height:1.65;-webkit-font-smoothing:antialiased}
.flag{height:5px;width:100%;display:flex;position:fixed;top:0;left:0;z-index:200}
.flag i{flex:1}.flag .b{background:#002654}.flag .w{background:#fff}.flag .r{background:var(--rouge)}

.topbar{position:fixed;top:5px;left:0;width:100%;z-index:150;background:var(--bleu);color:#fff;display:flex;align-items:center;gap:14px;padding:10px clamp(14px,5vw,40px);box-shadow:0 4px 18px rgba(0,0,0,.22)}
.topbar .home{color:#fff;text-decoration:none;display:flex;align-items:center;gap:11px;flex:none}
.crest{width:38px;height:38px;border-radius:50%;flex:none;background:var(--bleu-fonce);border:2px solid var(--or);display:flex;align-items:center;justify-content:center;font-size:17px}
.topbar .ttl{font-weight:700;font-size:.92rem;letter-spacing:.2px;line-height:1.15}
.topbar .sub{font-size:.68rem;opacity:.72;text-transform:uppercase;letter-spacing:1.6px}
.topbar .spacer{flex:1}
.topbar .logos{display:flex;align-items:center;gap:12px}
.topbar .logos img{height:26px;width:auto;background:#fff;border-radius:5px;padding:3px 6px;display:block}
.topbar .stepper{display:flex;gap:6px;align-items:center;margin-left:6px}
.dot{width:9px;height:9px;border-radius:50%;background:rgba(255,255,255,.25);transition:var(--transition)}
.dot.active{background:var(--or);transform:scale(1.35)}
.dot.done{background:#fff}

.wrap{max-width:920px;margin:0 auto;padding:118px clamp(16px,5vw,32px) 70px}
.screen{display:none;animation:rise .5s ease both}
.screen.show{display:block}
@keyframes rise{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}

.card{background:var(--surface);border:1px solid var(--bordure);border-radius:var(--rayon);box-shadow:var(--ombre);padding:clamp(24px,4vw,46px)}
.eyebrow{display:inline-flex;align-items:center;gap:8px;font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:1.6px;color:var(--bleu);background:rgba(0,32,91,.07);padding:6px 15px;border-radius:999px;margin-bottom:18px}
@media (prefers-color-scheme:dark){.eyebrow{color:var(--or);background:rgba(200,162,75,.13)}}
h1{font-size:clamp(1.7rem,4vw,2.5rem);line-height:1.12;color:var(--bleu);font-weight:800;margin-bottom:14px;letter-spacing:-.3px}
@media (prefers-color-scheme:dark){h1{color:#fff}}
h2{font-size:1.5rem;color:var(--bleu);margin-bottom:6px;font-weight:700}
@media (prefers-color-scheme:dark){h2{color:#eaf1f8}}
.lead{font-size:1.1rem;color:var(--texte-doux);max-width:64ch}

.partner-row{display:flex;align-items:center;gap:22px;flex-wrap:wrap;padding:18px 0 6px;margin-bottom:6px}
.partner-row img{height:40px;width:auto;display:block}
.partner-row img.rf{height:48px}
@media (prefers-color-scheme:dark){.partner-row img{background:#fff;border-radius:6px;padding:4px 7px}}

.facts{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px;margin:30px 0}
.fact{background:var(--surface-2);border:1px solid var(--bordure);border-radius:12px;padding:18px}
.fact b{display:block;font-size:1.6rem;color:var(--bleu);line-height:1}
@media (prefers-color-scheme:dark){.fact b{color:var(--or-clair)}}
.fact span{font-size:.8rem;color:var(--texte-doux);text-transform:uppercase;letter-spacing:.5px}

.field{margin-bottom:18px}
.field label{display:block;font-weight:600;font-size:.9rem;margin-bottom:6px}
.field input,.field select{width:100%;padding:13px 15px;border:1.5px solid var(--bordure);border-radius:10px;background:var(--surface);color:var(--texte);font-size:1rem;font-family:inherit;transition:var(--transition)}
.field input:focus{outline:none;border-color:var(--bleu);box-shadow:0 0 0 4px rgba(0,32,91,.1)}

.btn{padding:14px 28px;border:none;border-radius:10px;font-size:1rem;font-weight:700;cursor:pointer;font-family:inherit;transition:var(--transition);display:inline-flex;align-items:center;justify-content:center;gap:8px}
.btn-primary{background:var(--bleu);color:#fff;box-shadow:0 6px 16px rgba(0,32,91,.25)}
.btn-primary:hover{background:var(--bleu-clair);transform:translateY(-2px)}
.btn-primary:disabled{opacity:.45;cursor:not-allowed;transform:none;box-shadow:none}
.btn-ghost{background:transparent;border:1.5px solid var(--bordure);color:var(--texte)}
.btn-ghost:hover{background:var(--surface-2)}
.btn-gold{background:linear-gradient(135deg,var(--or),var(--or-clair));color:#3a2c06}
.btn-gold:hover{transform:translateY(-2px);box-shadow:0 8px 20px rgba(200,162,75,.4)}
.btn-row{display:flex;gap:12px;flex-wrap:wrap;margin-top:24px}
.btn-block{width:100%}

.lesson-progress{display:flex;gap:6px;margin-bottom:24px;flex-wrap:wrap}
.chip{font-size:.78rem;font-weight:600;padding:7px 13px;border-radius:999px;border:1.5px solid var(--bordure);color:var(--texte-doux);background:var(--surface);display:flex;align-items:center;gap:6px;cursor:pointer;transition:var(--transition)}
.chip.active{border-color:var(--bleu);color:var(--bleu);background:rgba(0,32,91,.06)}
.chip.done{border-color:var(--ok);color:var(--ok);background:var(--ok-fond)}
.chapter-head{display:flex;align-items:center;gap:16px;margin-bottom:18px}
.chapter-ico{width:54px;height:54px;border-radius:14px;flex:none;background:linear-gradient(135deg,var(--bleu),var(--bleu-clair));display:flex;align-items:center;justify-content:center;font-size:26px;color:#fff}
.lesson-body p{margin-bottom:14px}
.lesson-body ul{margin:0 0 16px 4px;padding-left:22px}
.lesson-body li{margin-bottom:8px}
.lesson-body h3{font-size:1.1rem;color:var(--bleu);margin:20px 0 8px}
.callout{border-left:4px solid var(--or);background:var(--surface-2);border-radius:0 10px 10px 0;padding:14px 18px;margin:18px 0}
.callout.warn{border-left-color:var(--rouge)}
.src{font-size:.78rem;color:var(--texte-doux);font-style:italic;margin-top:16px;border-top:1px dashed var(--bordure);padding-top:12px}

.bar{background:var(--surface);border:1px solid var(--bordure);border-radius:12px;padding:14px 18px;margin-bottom:20px}
.bar-top{display:flex;justify-content:space-between;font-size:.85rem;color:var(--texte-doux);margin-bottom:8px;font-weight:600}
.track{background:var(--bordure);border-radius:99px;height:8px;overflow:hidden}
.fill{height:100%;background:linear-gradient(90deg,var(--bleu),var(--or));border-radius:99px;transition:width .4s ease;width:0}
.q-num{font-size:.74rem;font-weight:700;color:var(--bleu);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
.q-text{font-size:1.3rem;font-weight:700;margin-bottom:22px;line-height:1.35}
.opts{display:flex;flex-direction:column;gap:12px}
.opt{border:2px solid var(--bordure);border-radius:11px;padding:15px 18px;cursor:pointer;display:flex;align-items:center;gap:14px;transition:var(--transition);background:var(--surface)}
.opt:hover{border-color:var(--bleu);background:var(--surface-2)}
.opt .ltr{width:30px;height:30px;flex:none;border-radius:8px;background:var(--surface-2);border:1.5px solid var(--bordure);display:flex;align-items:center;justify-content:center;font-weight:700;color:var(--texte-doux);transition:var(--transition)}
.opt.selected{border-color:var(--bleu);background:rgba(0,32,91,.07)}
.opt.selected .ltr{background:var(--bleu);color:#fff;border-color:var(--bleu)}
.opt.correct{border-color:var(--ok);background:var(--ok-fond)}
.opt.correct .ltr{background:var(--ok);color:#fff;border-color:var(--ok)}
.opt.wrong{border-color:var(--err);background:var(--err-fond)}
.opt.wrong .ltr{background:var(--err);color:#fff;border-color:var(--err)}
.opt.locked{cursor:default;pointer-events:none}
.opt-txt{flex:1}
.explain{margin-top:18px;border-radius:10px;padding:16px 18px;display:none;font-size:.95rem;background:var(--ok-fond);border-left:4px solid var(--ok)}
.explain.show{display:block;animation:rise .3s ease}
.explain.bad{background:var(--err-fond);border-left-color:var(--err)}

.score-ring{width:170px;height:170px;border-radius:50%;margin:0 auto 24px;display:flex;align-items:center;justify-content:center;flex-direction:column;background:conic-gradient(var(--clr,var(--bleu)) var(--deg,0deg),var(--bordure) 0);position:relative}
.score-ring::before{content:"";position:absolute;inset:14px;border-radius:50%;background:var(--surface)}
.score-ring .pct{position:relative;font-size:2.6rem;font-weight:800;color:var(--clr,var(--bleu))}
.verdict{text-align:center}
.vs{background:var(--surface-2);border:1px solid var(--bordure);border-radius:12px;padding:18px}
.vs .v{font-size:1.8rem;font-weight:800}

.diploma{background:var(--surface);border:2px solid var(--or);border-radius:14px;padding:clamp(26px,5vw,54px);position:relative;overflow:hidden;text-align:center;box-shadow:var(--ombre)}
.diploma::before{content:"";position:absolute;inset:10px;border:1px solid var(--or);border-radius:8px;pointer-events:none;opacity:.5}
.diploma .dlogos{display:flex;justify-content:center;align-items:center;gap:22px;flex-wrap:wrap;margin-bottom:10px}
.diploma .dlogos img{height:38px;width:auto}
.diploma .ttl{font-size:clamp(1.5rem,3vw,2rem);font-weight:800;color:var(--bleu);font-family:Georgia,serif;margin:8px 0}
.diploma .name{font-size:clamp(1.6rem,4vw,2.4rem);font-weight:800;font-family:Georgia,serif;color:var(--texte);margin:6px 0}
.diploma .meta{font-size:.95rem;color:var(--texte-doux);max-width:62ch;margin:14px auto}
.diploma .sign-row{display:flex;justify-content:space-between;gap:20px;margin-top:36px;flex-wrap:wrap;text-align:left}
.diploma .sig .line{border-top:1.5px solid var(--texte-doux);padding-top:6px;font-size:.82rem;color:var(--texte-doux)}
.diploma .seal{position:absolute;right:clamp(18px,5vw,48px);bottom:clamp(18px,5vw,48px);width:96px;height:96px;border-radius:50%;border:2px dashed var(--or);display:flex;align-items:center;justify-content:center;flex-direction:column;color:var(--or);font-size:.58rem;font-weight:700;text-align:center;line-height:1.2;transform:rotate(-12deg);opacity:.85}

footer{text-align:center;padding:30px;color:var(--texte-doux);font-size:.8rem}
.no-print{display:block}
@media print{
  .flag,.topbar,.btn-row,footer,.no-print{display:none !important}
  .wrap{padding:0}
  .screen{display:none !important}
  #screen-diploma{display:block !important}
  .diploma{border:2px solid #b8902f;box-shadow:none}
}
</style>
</head>
<body>
<div class="flag"><i class="b"></i><i class="w"></i><i class="r"></i></div>

<div class="topbar">
  <a class="home" href="index.html">
    <span class="crest">⚓</span>
    <span><span class="ttl" id="bar-title">Formation</span><br><span class="sub">FFEAU · Camp de la Paix</span></span>
  </a>
  <div class="spacer"></div>
  <div class="stepper" id="stepper"><span class="dot active"></span><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>
</div>

<div class="wrap">
  <!-- ACCUEIL -->
  <section class="screen show" id="screen-home">
    <div class="card">
      <h1 id="home-title"></h1>
      <p class="lead" id="home-intro"></p>
      <div class="facts">
        <div class="fact"><b id="f-chapters">0</b><span>Chapitres</span></div>
        <div class="fact"><b id="f-questions">0</b><span>Questions</span></div>
        <div class="fact"><b id="f-duration">—</b><span>Durée</span></div>
        <div class="fact"><b id="f-pass">0%</b><span>Réussite</span></div>
      </div>
      <div class="field"><label>Grade et Nom Complet *</label><input id="in-name" type="text" placeholder="ex. Maître DUPONT Jean"></div>
      <div class="btn-row"><button class="btn btn-primary btn-block" id="btn-start">Commencer →</button></div>
    </div>
  </section>

  <!-- COURS -->
  <section class="screen" id="screen-lesson">
    <div class="lesson-progress" id="lesson-chips"></div>
    <div class="card">
      <div class="chapter-head"><div class="chapter-ico" id="ch-ico">📘</div><div><div class="q-num" id="ch-counter"></div><h2 id="ch-title"></h2></div></div>
      <div class="lesson-body" id="ch-body"></div>
      <div class="btn-row"><button class="btn btn-ghost" id="lesson-prev">Précédent</button><button class="btn btn-primary" id="lesson-next" style="margin-left:auto">Suivant</button></div>
    </div>
  </section>

  <!-- QCM -->
  <section class="screen" id="screen-quiz">
    <div class="bar">
      <div class="bar-top"><span>Question <b id="q-cur">1</b> / <span id="q-tot">0</span></span><span id="q-score"></span></div>
      <div class="track"><div class="fill" id="q-fill"></div></div>
    </div>
    <div class="card">
      <div class="q-text" id="q-text"></div>
      <div class="opts" id="q-opts"></div>
      <div class="explain" id="q-explain"></div>
      <div class="btn-row"><button class="btn btn-primary" id="q-next" style="margin-left:auto" disabled>Valider</button></div>
    </div>
  </section>

  <!-- RÉSULTATS -->
  <section class="screen" id="screen-results">
    <div class="card verdict">
      <div class="score-ring" id="ring"><span class="pct" id="r-pct">0%</span></div>
      <h1 id="r-title"></h1>
      <p class="lead" id="r-msg"></p>
      <div class="btn-row" style="justify-content:center">
        <button class="btn btn-gold no-print" id="r-diploma">Voir mon diplôme</button>
        <button class="btn btn-ghost no-print" id="r-retry">Recommencer</button>
      </div>
    </div>
  </section>

<script>
const MODULE = {
  title: "Hygiène numérique",
  intro: "La sécurité de nos systèmes d'information dépend de la vigilance de chacun. Ce module détaille les 10 règles d'or de l'ANSSI pour protéger vos outils professionnels et personnels contre les cybermenaces.",
  duration: "≈ 30 min",
  passPercent: 80, poolSize: 10,
  disclaimer: "Source : ANSSI (10 règles d'or en matière de sécurité numérique). Mise à jour : Juin 2026.",
  lessons: [
    { icon:"🔑", title:"Chapitre 1 : Des mots de passe complexes", html:`<p>Un mot de passe faible est la première porte d'entrée pour un attaquant. L'ANSSI impose des critères stricts.</p><ul><li><b>Robustesse :</b> 12 caractères minimum, avec majuscules, minuscules, chiffres et caractères spéciaux.</li><li><b>Exemple concret :</b> 'M0tD3P@ss3!' est faible car prévisible. Privilégiez les <b>phrases de passe</b> (ex: 'LeChatMangeLaSourisVerte!42').</li></ul>` },
    { icon:"🔒", title:"Chapitre 2 : L'unicité des accès", html:`<p>Avoir un mot de passe fort ne suffit pas s'il est utilisé partout.</p><ul><li><b>Règle d'or :</b> N'utilisez <u>jamais</u> le même mot de passe pour votre messagerie professionnelle et vos comptes personnels.</li><li><b>Explication :</b> Si un forum mal sécurisé est piraté, les attaquants testeront immédiatement vos identifiants sur d'autres services (dont votre boîte mail pro).</li></ul>` },
    { icon:"🛡️", title:"Chapitre 3 : L'authentification à double facteur", html:`<p>Le 2FA (Two-Factor Authentication) ajoute une couche de sécurité vitale.</p><ul><li>Même si votre mot de passe est volé, l'attaquant ne pourra pas se connecter sans le second facteur (code SMS, application d'authentification sur votre téléphone, ou clé physique).</li><li><b>Action :</b> Activez-le systématiquement sur tous les services qui le proposent (banque, réseaux sociaux, accès distants professionnels).</li></ul><div class='callout' style='border-left-color:var(--bleu)'><b style='color:var(--bleu)'>Définition : 2FA (Double Facteur)</b> — Méthode d'authentification exigeant deux preuves d'identité distinctes (ce que je connais + ce que je possède).</div>` },
    { icon:"💼", title:"Chapitre 4 : La gestion des mots de passe", html:`<p>Il est humainement impossible de mémoriser 50 mots de passe complexes différents.</p><ul><li><b>Solution :</b> Utilisez un <b>coffre-fort de mots de passe</b> (gestionnaire sécurisé). Vous n'aurez qu'un seul mot de passe maître très robuste à retenir.</li><li><b>Interdictions :</b> N'écrivez jamais vos mots de passe sur des post-it sous le clavier, et ne les envoyez jamais par email en clair.</li></ul><div class='callout' style='border-left-color:var(--bleu)'><b style='color:var(--bleu)'>Définition : Coffre-fort numérique</b> — Logiciel hautement sécurisé qui chiffre et stocke l'ensemble de vos identifiants derrière un mot de passe maître unique.</div>` },
    { icon:"🔀", title:"Chapitre 5 : La séparation stricte des usages", html:`<p>Cloisonner vie professionnelle et personnelle est indispensable pour éviter les contaminations croisées.</p><ul><li>N'utilisez jamais votre adresse email professionnelle pour vous inscrire sur des sites d'achats ou des réseaux sociaux personnels.</li><li>Inversement, ne transférez pas de documents professionnels vers votre boîte mail personnelle (ex: Gmail) pour "travailler le soir".</li></ul>` },
    { icon:"🔌", title:"Chapitre 6 : Le danger des supports amovibles", html:`<p>Les clés USB sont l'un des vecteurs de virus les plus redoutables (ex: attaque Stuxnet).</p><ul><li><b>Interdiction :</b> Ne branchez <u>jamais</u> sur le réseau professionnel un équipement personnel ou une clé USB offerte lors d'un salon.</li><li><b>Exemple :</b> Une clé trouvée sur le parking de la base est très probablement un piège tendu par un attaquant ("clef empoisonnée"). Remettez-la au service sécurité.</li></ul>` },
    { icon:"📡", title:"Chapitre 7 : La mobilité et les réseaux publics", html:`<p>En déplacement, vos données sont particulièrement exposées, notamment dans les gares, hôtels ou aéroports.</p><ul><li><b>Wi-Fi publics :</b> Ce sont des réseaux souvent ouverts, facilement interceptables par un pirate installé dans le même café. Évitez-les !</li><li><b>Alternative :</b> Utilisez la fonction <b>"partage de connexion"</b> de votre smartphone (4G/5G) ou connectez-vous impérativement via le VPN de votre organisation.</li></ul><div class='callout' style='border-left-color:var(--bleu)'><b style='color:var(--bleu)'>Définition : VPN (Réseau Privé Virtuel)</b> — Tunnel chiffré qui sécurise votre connexion Internet, rendant vos données illisibles même sur un réseau public.</div>` },
    { icon:"📧", title:"Chapitre 8 : Le Phishing (Hameçonnage)", html:`<p>L'hameçonnage consiste à usurper l'identité d'un organisme connu pour vous inciter à cliquer sur un lien malveillant ou à fournir vos identifiants.</p><ul><li><b>Le réflexe :</b> Ne cliquez pas précipitamment. Survolez le lien avec votre souris (sans cliquer) pour vérifier l'adresse web réelle.</li><li><b>Signes d'alerte :</b> Urgence menaçante ("votre compte va être fermé"), fautes d'orthographe, adresse d'expéditeur suspecte.</li></ul><div class='callout' style='border-left-color:var(--bleu)'><b style='color:var(--bleu)'>Définition : Hameçonnage (Phishing)</b> — Technique frauduleuse destinée à tromper l'internaute pour l'inciter à communiquer des données personnelles en se faisant passer pour un tiers de confiance.</div>` },
    { icon:"⚙️", title:"Chapitre 9 : L'importance des mises à jour", html:`<p>Les failles de sécurité des logiciels sont découvertes et exploitées chaque jour par les cybercriminels.</p><ul><li>Les éditeurs publient des correctifs pour "colmater" ces failles. Un appareil non mis à jour est une cible facile.</li><li><b>Action :</b> Appliquez les mises à jour de votre système d'exploitation, de vos applications et de votre antivirus <u>dès qu'elles vous sont proposées</u>.</li></ul>` },
    { icon:"💾", title:"Chapitre 10 : Les sauvegardes (Backups)", html:`<p>Une attaque par "Ransomware" (rançongiciel) chiffre vos données et exige un paiement pour les débloquer. Le matériel peut aussi être volé ou cassé.</p><ul><li><b>La parade :</b> Effectuez des sauvegardes régulières de vos fichiers importants.</li><li><b>Principe de déconnexion :</b> La sauvegarde doit être conservée sur un support <u>déconnecté</u> de votre ordinateur après copie (un disque dur externe que l'on range). Sinon, le virus chiffrera aussi la sauvegarde.</li></ul><div class='callout' style='border-left-color:var(--bleu)'><b style='color:var(--bleu)'>Définition : Rançongiciel (Ransomware)</b> — Logiciel malveillant qui bloque l'accès à l'ordinateur ou chiffre les fichiers, et réclame le paiement d'une rançon pour en restituer l'accès.</div>` }
  ],
  quiz: [
    { q:"Quelle est la longueur minimale d'un mot de passe robuste selon l'ANSSI ?", options:["8 caractères","10 caractères","12 caractères","15 caractères"], a:2, why:"L'ANSSI recommande 12 caractères minimum avec une complexité mixte (majuscules, minuscules, chiffres, caractères spéciaux)." },
    { q:"Quelles sont les méthodes recommandées par l'ANSSI pour gérer ses multiples mots de passe ? (Plusieurs choix possibles)", type:"multi", options:["Les noter dans un fichier Word caché","Utiliser un coffre-fort de mots de passe","Créer des phrases de passe mémorisables","Utiliser le nom de son animal de compagnie"], a:[1, 2], why:"Le coffre-fort numérique et les phrases de passe complexes sont les seules méthodes robustes recommandées." },
    { q:"Si j'utilise un mot de passe très fort (15 caractères), puis-je l'utiliser pour mon mail pro ET mon compte Facebook ?", options:["Oui, puisqu'il est très fort","Non, car si Facebook est piraté, mon mail pro le sera aussi"], a:1, why:"L'unicité des mots de passe est vitale. Un mot de passe volé sur un site peu sécurisé sera testé sur tous vos autres comptes." },
    { q:"Puis-je brancher la clé USB que je viens de trouver sur le parking pour voir à qui elle appartient ?", options:["Oui, si je lance l'antivirus d'abord","Non, je la jette ou la remets au service de sécurité (OSSI)"], a:1, why:"Une clé USB trouvée est un piège classique pour introduire un malware sur un réseau." },
    { q:"Quelle est la meilleure pratique pour se connecter à Internet en déplacement dans un aéroport ?", options:["Utiliser le Wi-Fi public gratuit","Utiliser le partage de connexion de son smartphone (4G/5G)"], a:1, why:"Le partage de connexion de votre mobile est beaucoup plus sécurisé que les Wi-Fi publics, qui peuvent être facilement interceptés." },
    { q:"Quand devez-vous appliquer les mises à jour de sécurité sur votre ordinateur ou smartphone ?", options:["Une fois par an","Dès qu'elles sont proposées","Jamais, car ça ralentit l'appareil"], a:1, why:"Les mises à jour corrigent souvent des failles de sécurité critiques déjà exploitées par des pirates." },
    { q:"Pour protéger ses sauvegardes contre un rançongiciel (ransomware), il faut :", options:["Laisser le disque dur de sauvegarde branché en permanence","Débrancher le disque dur de sauvegarde après la copie","Mettre un mot de passe sur le dossier"], a:1, why:"Le support de sauvegarde doit être déconnecté. Si le ransomware infecte l'ordinateur, il chiffrera tout ce qui y est branché." },
    { q:"Comment vérifier l'authenticité d'un lien dans un email douteux sans cliquer dessus ?", options:["En répondant à l'expéditeur pour lui demander","En survolant le lien avec la souris pour voir l'adresse réelle s'afficher","En cliquant dessus avec le clic droit"], a:1, why:"Survoler le lien (sans cliquer) permet de révéler l'URL de destination, souvent différente de celle affichée dans le texte." },
    { q:"Qu'est-ce que l'authentification à double facteur (2FA) ?", options:["Avoir deux mots de passe différents","La nécessité de fournir une seconde preuve d'identité (ex: code SMS) en plus du mot de passe","Changer de mot de passe tous les deux mois"], a:1, why:"Le 2FA exige un élément que l'on connaît (mot de passe) et un élément que l'on possède (smartphone, clé physique)." },
    { q:"Est-il permis d'utiliser sa messagerie professionnelle pour créer un compte sur un site de e-commerce personnel ?", options:["Oui, si on ne l'utilise que pendant la pause","Non, car cela mélange les usages professionnels et personnels"], a:1, why:"La séparation des usages est stricte pour éviter que la compromission d'un site grand public n'affecte la sécurité professionnelle." }
  ]
};

const $ = id => document.getElementById(id);
const screens = ["home","lesson","quiz","results","diploma"];
const stepFor = {home:0, lesson:1, quiz:2, results:2, diploma:3};
let state = { name:"", lessonIdx:0, qIdx:0, answers:[], activeQuiz:[], locked:false };

function show(name){
  screens.forEach(s=>$("screen-"+s).classList.toggle("show", s===name));
  [...$("stepper").children].forEach((d,i)=> { d.classList.toggle("active", i===stepFor[name]); d.classList.toggle("done", i<stepFor[name]); });
  window.scrollTo({top:0,behavior:"smooth"});
}

function initHome(){
  $("home-title").textContent = MODULE.title; $("home-intro").textContent = MODULE.intro;
  $("f-chapters").textContent = MODULE.lessons.length; $("f-questions").textContent = MODULE.poolSize || MODULE.quiz.length;
  $("f-duration").textContent = MODULE.duration; $("f-pass").textContent = MODULE.passPercent + "%";
  $("bar-title").textContent = MODULE.title; $("disclaimer").textContent = MODULE.disclaimer || "";
}

$("btn-start").onclick = ()=>{
  state.name = $("in-name").value.trim(); if(!state.name) return;
  state.lessonIdx = 0; renderLesson(); show("lesson");
};

function renderLesson(){
  const l = MODULE.lessons[state.lessonIdx];
  $("ch-ico").textContent = l.icon; $("ch-counter").textContent = "Chapitre "+(state.lessonIdx+1);
  $("ch-title").textContent = l.title; $("ch-body").innerHTML = l.html;
  $("lesson-next").textContent = state.lessonIdx===MODULE.lessons.length-1 ? "Quiz →" : "Suivant";
}
$("lesson-prev").onclick = ()=>{ if(state.lessonIdx>0){state.lessonIdx--;renderLesson();} };
$("lesson-next").onclick = ()=>{ if(state.lessonIdx < MODULE.lessons.length-1){ state.lessonIdx++; renderLesson(); } else startQuiz(); };

function startQuiz(){
  let pool = [...MODULE.quiz].sort(()=>0.5-Math.random());
  state.activeQuiz = pool.slice(0, MODULE.poolSize || MODULE.quiz.length);
  state.qIdx=0; state.answers=state.activeQuiz.map(q=> q.type==="multi" ? [] : null);
  $("q-tot").textContent = state.activeQuiz.length; renderQuestion(); show("quiz");
}

function renderQuestion(){
  const q = state.activeQuiz[state.qIdx]; state.locked=false;
  $("q-cur").textContent = state.qIdx+1; $("q-fill").style.width = (state.qIdx/state.activeQuiz.length*100)+"%";
  $("q-text").textContent = q.q + (q.type==="multi" ? " (Plusieurs choix possibles)" : "");
  $("q-explain").className="explain"; $("q-opts").innerHTML="";
  q.options.forEach((opt,i)=>{
    const el=document.createElement("div"); el.className="opt";
    el.innerHTML=`<span class="ltr">${q.type==="multi"?'☐':String.fromCharCode(65+i)}</span><span>${opt}</span>`;
    el.onclick=()=>selectOption(i); $("q-opts").appendChild(el);
  });
  $("q-next").disabled=true; $("q-next").textContent = "Valider";
}

function selectOption(i){
  if(state.locked) return;
  const q = state.activeQuiz[state.qIdx];
  if(q.type==="multi"){
    if(state.answers[state.qIdx].includes(i)) state.answers[state.qIdx] = state.answers[state.qIdx].filter(x=>x!==i);
    else state.answers[state.qIdx].push(i);
  } else state.answers[state.qIdx] = i;
  [...$("q-opts").children].forEach((el,idx)=>{
    let sel = q.type==="multi" ? state.answers[state.qIdx].includes(idx) : state.answers[state.qIdx] === idx;
    el.classList.toggle("selected", sel);
    if(q.type==="multi") el.querySelector(".ltr").textContent = sel ? "☑" : "☐";
  });
  $("q-next").disabled = q.type==="multi" ? state.answers[state.qIdx].length===0 : state.answers[state.qIdx]===null;
}

$("q-next").onclick = ()=>{
  const q = state.activeQuiz[state.qIdx]; const ans = state.answers[state.qIdx];
  if(!state.locked){
    state.locked=true;
    let isCorrect = q.type==="multi" ? (ans.length === (Array.isArray(q.a)?q.a.length:1) && ans.every(v=> Array.isArray(q.a)?q.a.includes(v):v===q.a)) : ans === q.a;
    [...$("q-opts").children].forEach((el,idx)=>{
      el.classList.add("locked");
      let right = Array.isArray(q.a) ? q.a.includes(idx) : q.a === idx;
      if(right) el.classList.add("correct"); else if((q.type==="multi"?ans.includes(idx):ans===idx)) el.classList.add("wrong");
    });
    $("q-explain").className="explain show "+(isCorrect?"":"bad");
    $("q-explain").innerHTML=`<b>${isCorrect?"✓ Correct : ":"✗ Incorrect : "}</b> ${q.why}`;
    $("q-next").textContent = state.qIdx===state.activeQuiz.length-1 ? "Résultat" : "Suivant";
  } else {
    if(state.qIdx < state.activeQuiz.length-1){ state.qIdx++; renderQuestion(); } else showResults();
  }
};

function showResults(){
  let ok = state.activeQuiz.reduce((s,q,i)=>{
    let ans = state.answers[i];
    let correct = q.type==="multi" ? (ans.length === (Array.isArray(q.a)?q.a.length:1) && ans.every(v=> Array.isArray(q.a)?q.a.includes(v):v===q.a)) : ans === q.a;
    return s + (correct?1:0);
  }, 0);
  const pct = Math.round(ok/state.activeQuiz.length*100); const passed = pct>=MODULE.passPercent;
  $("ring").style.setProperty("--deg",(pct*3.6)+"deg"); $("r-pct").textContent=pct+"%";
  $("r-title").textContent = passed ? "Validé !" : "Échec";
  $("r-msg").textContent = passed ? "Félicitations "+state.name : "Note insuffisante pour valider.";
  $("r-diploma").style.display = passed ? "" : "none";
  show("results"); state._pct = pct;
}

function certId(){ return "FFEAU-"+Math.random().toString(36).substr(2,6).toUpperCase(); }

$("r-diploma").onclick = ()=>{
  $("d-name").textContent = state.name; $("d-date").textContent = new Date().toLocaleDateString("fr-FR");
  $("d-meta").innerHTML = `pour la formation <b>${MODULE.title}</b> avec un score de <b>${state._pct}%</b>.`;
  $("d-id").textContent = "ID : " + certId(); show("diploma");
};

$("btn-email").onclick = ()=>{
  const body = `Bonjour,\n\nJ'ai validé la formation "${MODULE.title}" avec un score de ${state._pct}%.\n\nNom : ${state.name}\nDate : ${new Date().toLocaleDateString()}\nRéférence : ${$("d-id").textContent}\n\nCordialement.`;
  window.location.href = `mailto:?subject=Validation Formation ${MODULE.title}&body=${encodeURIComponent(body)}`;
};

$("d-back").onclick = ()=> show("results"); $("r-retry").onclick = ()=> show("home");
initHome();
</script>
</body>
</html>
